<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Poker - Gambo</title>
  <link rel="icon" type="image/jpg" href="images/logo.png">
  <link rel="preload" href="gambo.css" as="style">
  <link rel="stylesheet" href="gambo.css" />
  <script defer src="js/core.js"></script>
  <script defer src="js/poker.js"></script>
  <style>
    #pokerGame {
      margin: 20px auto;
      padding: clamp(12px, 2vw, 20px);
      width: min(94vw, 1500px);
      max-width: 1500px; 
      background-color: rgba(34, 34, 34, 0.84);
      border: 1px solid rgba(255, 215, 0, 0.18);
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(2px);
    }
    
    #pokerGame h1 {
        color: gold;
        margin: 0;
        text-align: center;
        text-shadow:
        -1px -1px 0 black,
        1px -1px 0 black,
        -2px  2px 0 black,
        2px  2px 0 black; 
    }

    .poker-container {
      position: relative;
      width: min(100%, 1200px);
      max-width: 1200px;
      margin: 0 auto;
      height: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      --card-width: clamp(24px, 5.2vw, 65px);
      --card-gap: clamp(3px, 0.8vw, 10px);
    }
    #poker-table {
      width: 100%;
      max-width: 1200px;
      display: block;
      height: auto;
    }

    #game-message {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      width: max-content;
      max-width: 76%;
      font-size: clamp(11px, 1.9vw, 20px);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 5px clamp(8px, 1.5vw, 15px);
      border-radius: 8px;
      text-align: center;
      line-height: 1.2;
    }
    #pot-value {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(13px, 2.1vw, 22px);
      font-weight: bold;
      color: white;
    }
    .card {
      width: var(--card-width);
      aspect-ratio: 5 / 7;
      height: auto;
      display: block;
      filter: drop-shadow(0 4px 5px rgba(0, 0, 0, 0.45));
    }
    .hidden {
      opacity: 0;
    }

    .player-cards {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: var(--card-gap);
    }

    .community-cards {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: var(--card-gap);
      max-width: 88%;
    }

    .bot-container {
      position: absolute;
      text-align: center;
      color: white;
      font-weight: bold;
      font-size: clamp(11px, 1.6vw, 16px);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .bot-left {
      top: 28%;
      left: 20%;
      transform: translateX(-50%);
    }
    .bot-right {
      top: 28%;
      left: 80%;
      right: auto;
      transform: translateX(-50%);
    }
    .bot-name {
      margin-bottom: clamp(2px, 0.6vw, 5px);
    }
    .bot-cards {
      display: flex;
      gap: var(--card-gap);
      justify-content: center;
    }

    .buttons {
      width: 100%;
      margin-top: clamp(12px, 2vw, 20px);
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .buttons button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #555;
      color: #fff;
      border: none;
      border-radius: 5px;
      transition: background 0.3s;
    }
    .bet-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .bet-buttons button {
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    #new-game-btn {
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
    }
    .buttons button:disabled {
      background-color: #555;
      cursor: not-allowed;
      opacity: 0.6;
    }
    #pokerAudioToggle{
      cursor: pointer;
      margin-left: 10px;
      font-size: 1.2em;
      vertical-align: middle;
      color: gold;

    }

    @media (max-width: 700px) {
      #pokerGame {
        margin-left: 5px;
        margin-right: 5px;
        width: calc(100vw - 10px);
        max-width: 380px;
      }

      .poker-container {
        width: calc(100vw - 36px);
        max-width: 354px;
        --card-width: clamp(22px, 6vw, 36px);
        --card-gap: 3px;
      }

      #game-message {
        top: 8%;
      }

      #pot-value {
        top: 32%;
      }

      .bot-left,
      .bot-right {
        top: 13%;
      }

      .bot-left {
        left: 31%;
      }

      .bot-right {
        left: 69%;
        right: auto;
      }

      .community-cards {
        top: 50%;
      }

      .player-cards {
        bottom: 6%;
      }
    }

    @media (max-width: 520px) {
      .poker-container {
        --card-width: clamp(20px, 6.6vw, 30px);
        --card-gap: 2px;
      }

      #game-message {
        top: 5%;
        max-width: 82%;
      }

      #pot-value {
        top: 31%;
      }

      .bot-left,
      .bot-right {
        top: 12%;
      }

      .bot-left {
        left: 31%;
      }

      .bot-right {
        left: 69%;
        right: auto;
      }

      .community-cards {
        top: 51%;
      }

      .buttons button {
        flex: 1 1 86px;
        padding-inline: 10px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <video autoplay muted loop id="bgVideo" playsinline>
    <source src="images/bodybackground.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video> 

  <header>
    <a href="gamindex.html" class="logo">
      <img src="images/logo.png" alt="Website Logo" width="40" height="40">
    </a>
    <h1>GAMBO</h1>
    <div class="balance-section">
      <div id="balance"></div>
    </div>
  </header>
  <main>
  <div id="pokerGame">
    <h1>Poker
      <!-- Audio toggle icon -->
      <span id="pokerAudioToggle" onclick="togglePokerAudio()" title="Toggle Sound">&#128266;</span>
    </h1>
    
    <br>
    <div class="poker-container">
      <img src="images/table.png" id="poker-table" alt="Poker Table">

      <!-- Game messages & pot -->
      <div id="game-message">Waiting for bets...</div>
      <div id="pot-value">$0</div>

      <!-- Player Cards -->
      <div class="player-cards">
        <img id="player-card-1" class="card" src="images/cards/back_card.png">
        <img id="player-card-2" class="card" src="images/cards/back_card.png">
      </div>

      <!-- Community Cards -->
      <div class="community-cards" id="community-cards">
        <img id="comm-card-1" class="card" src="images/cards/back_card.png">
        <img id="comm-card-2" class="card" src="images/cards/back_card.png">
        <img id="comm-card-3" class="card" src="images/cards/back_card.png">
        <img id="comm-card-4" class="card" src="images/cards/back_card.png">
        <img id="comm-card-5" class="card" src="images/cards/back_card.png">
      </div>

      <!-- Bot 1 -->
      <div class="bot-container bot-left">
        <div id="bot1-name" class="bot-name">Bot 1</div>
        <div class="bot-cards">
          <img id="bot1-card-1" class="card" src="images/cards/back_card.png">
          <img id="bot1-card-2" class="card" src="images/cards/back_card.png">
        </div>
      </div>
      <!-- Bot 2 -->
      <div class="bot-container bot-right">
        <div id="bot2-name" class="bot-name">Bot 2</div>
        <div class="bot-cards">
          <img id="bot2-card-1" class="card" src="images/cards/back_card.png">
          <img id="bot2-card-2" class="card" src="images/cards/back_card.png">
        </div>
      </div>
    </div>
   <div class="buttons">
      <div class="bet-buttons">
        <button id="pokerBet-btn" disabled>Bet/Call</button>
        <button id="pokerRaise-btn" disabled>Raise</button>
        <button id="pokerFold-btn" disabled>Fold</button>
      </div>
      <button id="pokerNew-game-btn" disabled>New Game</button>
    </div>
  </div>
  </main>
  <footer class="site-footer">
    <p>&copy; 2025 GAMBO by Team ZSw0rD. All rights reserved.</p>
  </footer>
</body>
</html>
